apiVersion: apps/v1
kind: Deployment
metadata:
  name: pump-swarm
  labels:
    app: pump-swarm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pump-swarm
  template:
    metadata:
      labels:
        app: pump-swarm
    spec:
      containers:
        - name: swarm
          image: ghcr.io/nirholas/pump-agent-swarm:latest
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - secretRef:
                name: pump-swarm-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: swarm-data
              mountPath: /app/data
      volumes:
        - name: swarm-data
          emptyDir: {}
      restartPolicy: Always
