# ─── CronJobs — Cache Warming (replaces Cloud Scheduler) ────
# These are standard K8s CronJobs that curl the API endpoints
# to keep caches warm. Works on any Kubernetes cluster.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: refresh-coins
  namespace: crypto-vision
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: curl
              image: curlimages/curl:latest
              command: ["curl", "-sf", "http://crypto-vision/api/coins"]
          restartPolicy: OnFailure
---
