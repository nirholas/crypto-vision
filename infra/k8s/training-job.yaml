# ─── Llama 3.1 70B Training (A100 80GB, ~24 hours) ─────────
apiVersion: batch/v1
kind: Job
metadata:
  name: train-llama-70b
  namespace: training
  labels:
    app: crypto-vision
    component: training
    model: llama-3.1-70b
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: crypto-vision
        component: training
        model: llama-3.1-70b
    spec:
      serviceAccountName: training-sa
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-a100-80gb
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: trainer
          image: ${REGISTRY}/crypto-vision-trainer:latest
          command: ["python3"]
          args:
            - "scripts/opensource/train.py"
            - "--model=meta-llama/Llama-3.1-70B-Instruct"
            - "--data=data/prepared/train.jsonl"
            - "--eval-data=data/prepared/eval.jsonl"
            - "--output=/models/crypto-vision-llama-70b"
            - "--epochs=3"
            - "--batch-size=1"
            - "--grad-accum=16"
            - "--lr=1e-4"
            - "--max-seq-len=4096"
            - "--lora-r=16"
            - "--quantize"
            - "--quantize-method=awq"
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "80Gi"
              cpu: "12"
              ephemeral-storage: "100Gi"
            limits:
              nvidia.com/gpu: 1
              memory: "170Gi"
              cpu: "12"
              ephemeral-storage: "200Gi"
          env:
            - name: GCS_BUCKET
              value: "${PROJECT_ID}-models"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - mountPath: /models
              name: model-storage
      volumes:
        - name: model-storage
          emptyDir:
            sizeLimit: 200Gi
