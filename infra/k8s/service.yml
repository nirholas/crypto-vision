# ─── API Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: crypto-vision
  namespace: crypto-vision
  labels:
    app.kubernetes.io/name: crypto-vision
    app.kubernetes.io/part-of: crypto-vision
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: crypto-vision
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
---
# ─── Ingress (works with nginx-ingress, traefik, ALB, etc.) ─
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-vision
  namespace: crypto-vision
  labels:
    app.kubernetes.io/name: crypto-vision
    app.kubernetes.io/part-of: crypto-vision
  annotations:
    # Uncomment for your ingress controller:
    # nginx: kubernetes.io/ingress.class: nginx
    # traefik: kubernetes.io/ingress.class: traefik
    # AWS ALB: kubernetes.io/ingress.class: alb
    # GKE: kubernetes.io/ingress.class: gce
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - cryptocurrency.cv
      secretName: crypto-vision-tls
  rules:
    - host: cryptocurrency.cv
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crypto-vision
                port:
                  number: 80
