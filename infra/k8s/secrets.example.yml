# ─── Secret Template ─────────────────────────────────────────
# Create with:
#   kubectl create secret generic crypto-vision-secrets \
#     --namespace=crypto-vision \
#     --from-literal=COINGECKO_API_KEY=xxx \
#     --from-literal=GROQ_API_KEY=xxx \
#     --from-literal=GEMINI_API_KEY=xxx \
#     --from-literal=OPENAI_API_KEY=xxx \
#     --from-literal=ANTHROPIC_API_KEY=xxx \
#     --from-literal=OPENROUTER_API_KEY=xxx
#
# Or apply this file after base64-encoding your values:
apiVersion: v1
kind: Secret
metadata:
  name: crypto-vision-secrets
  namespace: crypto-vision
  labels:
    app.kubernetes.io/name: crypto-vision
    app.kubernetes.io/part-of: crypto-vision
type: Opaque
data:
  # base64-encoded values — replace with your actual keys:
  # echo -n "your-key" | base64
  COINGECKO_API_KEY: ""
  GROQ_API_KEY: ""
  GEMINI_API_KEY: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENROUTER_API_KEY: ""
