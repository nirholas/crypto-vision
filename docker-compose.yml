# ─────────────────────────────────────────────────────────────
# Crypto Vision — Docker Compose (Cloud-Portable)
#
# Run the full stack anywhere: localhost, AWS, Azure, bare metal.
# No GCP dependency whatsoever.
#
# Usage:
#   cp .env.example .env   # fill in API keys
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
    restart: unless-stopped

  # Lightweight cron — replaces Cloud Scheduler for non-GCP deploys.
  # Uses curl to hit API endpoints on a schedule.
  scheduler:
    image: alpine:3.19
    depends_on:
      api:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo "*/2 * * * * curl -sf http://api:8080/api/coins > /dev/null"         > /etc/crontabs/root
        echo "*/5 * * * * curl -sf http://api:8080/api/trending > /dev/null"      >> /etc/crontabs/root
        echo "*/5 * * * * curl -sf http://api:8080/api/global > /dev/null"        >> /etc/crontabs/root
        echo "*/15 * * * * curl -sf http://api:8080/api/fear-greed > /dev/null"   >> /etc/crontabs/root
        echo "*/10 * * * * curl -sf http://api:8080/api/defi/protocols > /dev/null" >> /etc/crontabs/root
        echo "*/10 * * * * curl -sf http://api:8080/api/defi/chains > /dev/null"  >> /etc/crontabs/root
        echo "*/5 * * * * curl -sf http://api:8080/api/news > /dev/null"          >> /etc/crontabs/root
        crond -f -l 6
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
